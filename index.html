<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scantorenov</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#060C18;--card:#0D1A2E;--blue:#4AB8E8;--bl:#7FCEEF;--muted:#6E92AA;--border:rgba(74,184,232,0.13)}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:#E8F2FA}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(6,12,24,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
    .logo{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:600;color:#fff;text-decoration:none}
    .logo span{color:var(--blue)}
    .nav-links{display:flex;gap:32px;list-style:none}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:0.85rem;font-weight:500;transition:color 0.2s}
    .nav-links a:hover{color:#fff}
    .nav-cta{padding:9px 22px;background:var(--blue);color:var(--bg);border:none;font-size:0.78rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;transition:background 0.2s}
    .nav-cta:hover{background:var(--bl)}
    .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 24px 80px;position:relative;overflow:hidden;background:linear-gradient(180deg,#060C18 0%,#0A1422 50%,#060C18 100%)}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 40%,rgba(74,184,232,0.06) 0%,transparent 70%)}
    .hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,5vw,4rem);font-weight:300;line-height:1.15;max-width:800px;position:relative}
    .hero-cta{display:inline-block;padding:14px 36px;background:var(--blue);color:var(--bg);font-size:0.82rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;transition:background 0.2s;position:relative;margin-top:40px}
    .hero-cta:hover{background:var(--bl)}
    .matterport-section{padding:60px 24px;background:#0A1422;border-top:1px solid var(--border)}
    .matterport-container{max-width:900px;margin:0 auto;position:relative;aspect-ratio:16/9;overflow:hidden;border:1px solid var(--border);box-shadow:0 8px 32px rgba(74,184,232,0.1)}
    .matterport-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
    section{padding:100px 48px;max-width:1200px;margin:0 auto}
    .section-label{font-size:0.65rem;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--blue);margin-bottom:16px}
    section h2{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;margin-bottom:40px}
    .services-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
    .service-card{background:var(--card);border:1px solid var(--border);padding:32px 28px;transition:border-color 0.3s,transform 0.3s;min-height:180px}
    .service-card:hover{border-color:rgba(74,184,232,0.35);transform:translateY(-3px)}
    .sc-icon{font-size:1.8rem;margin-bottom:18px}
    .sc-title{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;margin-bottom:10px}
    .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px}
    .contact-form{display:flex;flex-direction:column;gap:14px}
    .contact-form input,.contact-form textarea{background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:12px 16px;color:#E8F2FA;font-family:'Inter',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s}
    .contact-form input:focus,.contact-form textarea:focus{border-color:var(--blue)}
    .contact-form textarea{min-height:120px;resize:vertical}
    .contact-form button{padding:13px 28px;background:var(--blue);color:var(--bg);border:none;font-size:0.8rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;align-self:flex-start}
    .contact-form button:hover{background:var(--bl)}
    footer{border-top:1px solid var(--border);padding:40px 48px;display:flex;align-items:center;justify-content:space-between;font-size:0.78rem;color:var(--muted)}
    footer a{color:var(--blue);text-decoration:none}
    @media(max-width:768px){nav{padding:0 20px}.nav-links{display:none}section{padding:60px 20px}.contact-grid{grid-template-columns:1fr}.matterport-section{padding:40px 16px}}
  </style>
</head>
<body>
<!-- Redirect identity tokens (confirmation, recovery, invite) to /connexion -->
<script>
var h=window.location.hash||'';
if(h.indexOf('confirmation_token')>-1||h.indexOf('recovery_token')>-1||h.indexOf('invite_token')>-1||h.indexOf('access_token')>-1){
  window.location.replace('/connexion'+h);
}
</script>
<nav>
  <a href="#" class="logo">SCANTO<span>RENOV</span></a>
  <ul class="nav-links">
    <li><a href="#services">Services</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <a href="connexion.html" class="nav-cta">Espace Client</a>
</nav>
<div class="hero">
  <h1>Scantorenov</h1>
  <a href="#contact" class="hero-cta">Nous contacter</a>
</div>
<!-- VISITE VIRTUELLE MATTERPORT (RESPONSIVE) -->
<div class="matterport-section">
  <div class="matterport-container">
    <iframe src="https://my.matterport.com/show/?m=DKQ6zroSLKj" allowfullscreen allow="autoplay; fullscreen; web-share; xr-spatial-tracking;"></iframe>
  </div>
</div>
<!-- FIN VISITE VIRTUELLE -->
<section id="services">
  <div class="section-label">Services</div>
  <h2>Nos services</h2>
  <div class="services-grid">
    <div class="service-card">
      <div class="sc-icon">&#x1F3E0;</div>
      <div class="sc-title">Scan 3D Matterport</div>
    </div>
    <div class="service-card">
      <div class="sc-icon">&#x1F4D0;</div>
      <div class="sc-title">Maitrise d'Oeuvre</div>
    </div>
    <div class="service-card">
      <div class="sc-icon">&#x1F4CA;</div>
      <div class="sc-title">Espace Client</div>
    </div>
  </div>
</section>
<section id="contact">
  <div class="section-label">Contact</div>
  <h2>Contact</h2>
  <div class="contact-grid">
    <div></div>
    <form class="contact-form" name="contact" method="POST" data-netlify="true">
      <input type="text" name="nom" placeholder="Nom" required />
      <input type="email" name="email" placeholder="Email" required />
      <input type="text" name="sujet" placeholder="Sujet" />
      <textarea name="message" placeholder="Message..." required></textarea>
      <button type="submit">Envoyer</button>
    </form>
  </div>
</section>
<footer>
  <span>2026 Scantorenov</span>
  <a href="connexion.html">Espace Client</a>
</footer>
</body>
</html>
