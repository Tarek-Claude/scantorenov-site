<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Espace Client - Scantorenov</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#060C18;--card:#0D1A2E;--blue:#4AB8E8;--bl:#7FCEEF;--muted:#6E92AA;--border:rgba(74,184,232,0.13)}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:#E8F2FA;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .auth-guard{text-align:center;padding:40px}
    .auth-guard h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;margin-bottom:32px}
    .auth-btn{padding:13px 32px;background:var(--blue);color:var(--bg);border:none;font-size:0.82rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;text-decoration:none;display:inline-block}
    .auth-btn:hover{background:var(--bl)}
    .back-link{display:block;margin-top:20px;color:var(--muted);font-size:0.8rem;text-decoration:none}
    .back-link:hover{color:var(--blue)}
    .dashboard{display:none;width:100%;max-width:900px;padding:40px 24px}
    .dashboard.visible{display:block}
    .dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px}
    .dash-logo{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;color:#fff}
    .dash-logo span{color:var(--blue)}
    .dash-user{font-size:0.82rem;color:var(--muted)}
    .dash-logout{color:var(--blue);background:none;border:1px solid var(--border);padding:7px 16px;font-size:0.75rem;cursor:pointer;margin-left:14px;transition:all 0.2s}
    .dash-logout:hover{border-color:var(--blue)}
    .dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
    .dash-card{background:var(--card);border:1px solid var(--border);padding:28px 24px;transition:border-color 0.3s;min-height:140px}
    .dash-card:hover{border-color:rgba(74,184,232,0.35)}
    .dc-icon{font-size:1.6rem;margin-bottom:14px}
    .dc-title{font-family:'Space Grotesk',sans-serif;font-size:0.92rem;font-weight:600}
  </style>
</head>
<body>

<div class="auth-guard" id="authGuard">
  <h1>Espace Client</h1>
  <button class="auth-btn" onclick="netlifyIdentity.open()">Se connecter</button>
  <a href="index.html" class="back-link">Retour</a>
</div>

<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <div class="dash-logo">SCANTO<span>RENOV</span></div>
    <div>
      <span class="dash-user" id="userName"></span>
      <button class="dash-logout" onclick="netlifyIdentity.logout()">Deconnexion</button>
    </div>
  </div>
  <div class="dash-grid">
    <div class="dash-card">
      <div class="dc-icon">&#x1F3E0;</div>
      <div class="dc-title">Visite 3D</div>
    </div>
    <div class="dash-card">
      <div class="dc-icon">&#x1F916;</div>
      <div class="dc-title">Assistant IA</div>
    </div>
    <div class="dash-card">
      <div class="dc-icon">&#x1F4CB;</div>
      <div class="dc-title">Devis</div>
    </div>
    <div class="dash-card">
      <div class="dc-icon">&#x1F4C5;</div>
      <div class="dc-title">Planning</div>
    </div>
  </div>
</div>

<script>
  var netlifyIdentity = window.netlifyIdentity;
  function showDashboard(user) {
    document.getElementById('authGuard').style.display = 'none';
    document.getElementById('dashboard').classList.add('visible');
    document.getElementById('userName').textContent = user.user_metadata && user.user_metadata.full_name ? user.user_metadata.full_name : user.email;
  }
  function showLogin() {
    document.getElementById('authGuard').style.display = '';
    document.getElementById('dashboard').classList.remove('visible');
  }
  if (netlifyIdentity) {
    netlifyIdentity.on('init', function(user) { if (user) showDashboard(user); });
    netlifyIdentity.on('login', function(user) { showDashboard(user); });
    netlifyIdentity.on('logout', function() { showLogin(); });
  }
</script>
</body>
</html>
