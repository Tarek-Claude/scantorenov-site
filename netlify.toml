# ── Configuration Netlify — Scantorenov ──────────────────────────────

[build]
  functions = "netlify/functions"
  publish    = "."

# ── Redirections propres ─────────────────────────────────────────────
[[redirects]]
  from   = "/connexion"
  to     = "/connexion.html"
  status = 200

[[redirects]]
  from   = "/espace-client"
  to     = "/espace-client.html"
  status = 200

[[redirects]]
  from   = "/accueil"
  to     = "/index.html"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/admin-dashboard.html"
  status = 200

# ── Headers de sécurité ──────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Netlify Identity ─────────────────────────────────────────────────
# Activez Identity dans votre dashboard Netlify :
# Site settings → Identity → Enable Identity

[context.production.environment]
  NODE_VERSION = "18"
  SUPABASE_URL = "https://qvovfabwzyfhmkaluzss.supabase.co"
  # Variables à définir dans le dashboard Netlify:
  # SUPABASE_SERVICE_KEY
  # RESEND_API_KEY
  # ADMIN_SECRET
  # STRIPE_SECRET_KEY (sk_...)
  # STRIPE_PRICE_SCAN_ID (price_...)
  # STRIPE_WEBHOOK_SECRET (whsec_...)
  # PROMO_SCAN_BYPASS_CODES (liste separee par virgules / retours ligne)
  # PROMO_BYPASS_CODES (optionnel, codes globaux reutilisables)
  # PROMO_VISIT_BYPASS_CODES (optionnel, reserve au paiement visite virtuelle)
  # Optionnel: SITE_URL, EMAIL_FROM, ADMIN_NOTIFICATION_EMAIL
  # IMG_SOURCE_ALLOWLIST (CSV) domaines autorises pour image_url du provider together-kontext
  # Par defaut: Supabase Storage du projet
  # Site settings → Environment variables (NE PAS mettre les clés ici)
